backend:
  name: github
  repo: benng189-26/soundlax-lp
  branch: main
  base_url: https://www.bentoji.co.nz
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  # ─────────────────────────────────────────────────
  # SoundLax page
  # ─────────────────────────────────────────────────
  - name: soundlax_reviews
    label: "SoundLax · App Store Reviews"
    files:
      - name: reviews
        label: "Reviews"
        file: "content/testimonials.json"
        fields:
          - name: reviews
            label: "Reviews"
            widget: list
            fields:
              - {label: "Reviewer Name", name: name, widget: string}
              - {label: "Date", name: date, widget: string, hint: "e.g. Jun 9, 2026"}
              - {label: "Country", name: country, widget: string}
              - {label: "Review Title", name: title, widget: string}
              - {label: "Review Body", name: body, widget: text}

  - name: soundlax_faq
    label: "SoundLax · FAQ"
    files:
      - name: faq
        label: "FAQ Items"
        file: "content/faq.json"
        fields:
          - name: items
            label: "FAQ Items"
            widget: list
            fields:
              - {label: "Question", name: question, widget: string}
              - label: "Answer"
                name: answer
                widget: text
                hint: "HTML is supported. Use <p>paragraphs</p> and <ul><li>lists</li></ul>."

  # ─────────────────────────────────────────────────
  # Homepage
  # ─────────────────────────────────────────────────
  - name: homepage
    label: "Homepage"
    files:
      - name: content
        label: "Homepage Content"
        file: "content/homepage.json"
        fields:
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - {label: "Headline", name: title, widget: string}
              - {label: "Lead Paragraph", name: lead, widget: text}
          - name: about
            label: "About Section"
            widget: object
            fields:
              - {label: "Eyebrow Label", name: eyebrow, widget: string}
              - {label: "Heading", name: heading, widget: string}
              - name: paragraphs
                label: "Paragraphs"
                widget: list
                field: {label: "Paragraph", name: paragraph, widget: text}
          - name: services
            label: "What We Do (Services)"
            widget: object
            fields:
              - {label: "Eyebrow Label", name: eyebrow, widget: string}
              - {label: "Heading", name: heading, widget: string}
              - name: items
                label: "Service Cards"
                label_singular: "Service"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - {label: "Title", name: title, widget: string}
                  - {label: "Tagline", name: tagline, widget: text}
                  - name: paragraphs
                    label: "Paragraphs"
                    widget: list
                    field: {label: "Paragraph", name: paragraph, widget: text}
                  - {label: "List Label", name: listLabel, widget: string, required: false}
                  - name: list
                    label: "List Items"
                    widget: list
                    required: false
                    field: {label: "Item", name: item, widget: string}
                  - {label: "Link Text", name: linkText, widget: string, required: false}
          - name: why
            label: "What You Can Expect"
            widget: object
            fields:
              - {label: "Eyebrow Label", name: eyebrow, widget: string}
              - {label: "Heading", name: heading, widget: string}
              - name: items
                label: "Points"
                label_singular: "Point"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - {label: "Title", name: title, widget: string}
                  - {label: "Body", name: body, widget: text}
          - name: process
            label: "How Projects Usually Work"
            widget: object
            fields:
              - {label: "Eyebrow Label", name: eyebrow, widget: string}
              - {label: "Heading", name: heading, widget: string}
              - name: items
                label: "Steps"
                label_singular: "Step"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - {label: "Title", name: title, widget: string}
                  - {label: "Body", name: body, widget: text}
          - name: work
            label: "Selected Work (Heading)"
            widget: object
            fields:
              - {label: "Eyebrow Label", name: eyebrow, widget: string}
              - {label: "Heading", name: heading, widget: text}
          - name: cta
            label: "Call To Action"
            widget: object
            fields:
              - {label: "Heading", name: heading, widget: string}
              - {label: "Body", name: body, widget: text}
          - name: footer
            label: "Footer"
            widget: object
            fields:
              - {label: "Studio Blurb", name: blurb, widget: text}

  # ─────────────────────────────────────────────────
  # Contact page
  # ─────────────────────────────────────────────────
  - name: contact
    label: "Contact Page"
    files:
      - name: content
        label: "Contact Content"
        file: "content/contact.json"
        fields:
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - {label: "Heading", name: title, widget: string}
              - {label: "Lead Paragraph", name: lead, widget: text}
          - name: details
            label: "Contact Details"
            widget: object
            fields:
              - {label: "Email (display text)", name: email, widget: string}
              - {label: "Studio / Location", name: studio, widget: string}
              - {label: "What We Take On", name: takeOn, widget: text}
              - {label: "Response Time", name: response, widget: string}
          - name: footer
            label: "Footer"
            widget: object
            fields:
              - {label: "Studio Blurb", name: blurb, widget: text}
